<div data-controller="feedback" class="fixed bottom-4 right-4 z-50 md:bottom-6 md:right-6">
  <button
    data-feedback-target="toggleButton"
    data-action="click->feedback#toggleFeedback"
    class="ca-icon-btn h-12 w-12 border-[var(--ca-primary)] bg-[var(--ca-primary)] text-white hover:bg-[var(--ca-primary-strong)] md:h-14 md:w-14"
    aria-label="Provide feedback"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
  </button>

  <div
    data-feedback-target="overlay"
    data-action="click->feedback#closeIfClickedOutside"
    class="pointer-events-none fixed inset-0 z-40 flex items-center justify-center bg-[oklch(0.135_0.018_250_/_0.62)] opacity-0 transition-opacity duration-200"
  >
    <div
      data-feedback-target="formContainer"
      class="ca-panel mx-4 w-full max-w-md scale-95 p-6 transition-transform duration-200"
    >
      <h3 class="text-xl font-black text-ca-ink">Share feedback</h3>
      <p class="ca-copy mt-2 text-sm">Send a note about what felt rough, useful, or missing.</p>

      <form data-action="submit->feedback#submitFeedback" class="mt-5">
        {% csrf_token %}
        <div>
          <label for="feedback-input" class="ca-label">Feedback</label>
          <textarea
            id="feedback-input"
            data-feedback-target="feedbackInput"
            class="ca-field mt-2 min-h-[8rem]"
            rows="4"
            placeholder="What should be better?"
            required
          ></textarea>
        </div>

        <div class="mt-5 flex justify-end gap-3">
          <button type="button" data-action="click->feedback#closeFeedback" class="ca-btn ca-btn-secondary">
            Cancel
          </button>
          <button type="submit" class="ca-btn ca-btn-primary">
            Send feedback
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
