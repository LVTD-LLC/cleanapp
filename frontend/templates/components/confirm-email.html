{% if not email_verified %}
<div class="ca-panel mb-5 border-[oklch(0.84_0.1_55)] bg-[oklch(0.96_0.045_55)] p-4">
  <div class="flex gap-3">
    <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-lg bg-white">
      <svg class="h-5 w-5 text-[var(--ca-warning)]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" d="M8.485 3.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 3.495zM10 6a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 6zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
      </svg>
    </div>
    <div>
      <h3 class="text-sm font-black text-ca-ink">Confirm your email</h3>
      <form method="post" action="{{ resend_confirmation_url }}" class="mt-1 text-sm font-semibold leading-6 text-ca-muted">
        {% csrf_token %}
        <p>
          Some reminder features stay limited until your email is confirmed.
          <button type="submit" class="font-black text-ca-ink underline decoration-[var(--ca-warning)] underline-offset-4">
            Resend confirmation
          </button>
        </p>
      </form>
    </div>
  </div>
</div>
{% endif %}
