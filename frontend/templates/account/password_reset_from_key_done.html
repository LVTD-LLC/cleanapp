{% extends 'base_landing.html' %}

{% block content %}
<section class="ca-wrap grid min-h-[calc(100vh-10rem)] items-center py-12">
  <div class="ca-auth-card mx-auto w-full max-w-md p-6 text-center sm:p-8">
    <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-xl bg-[var(--ca-accent-soft)]">
      <svg class="h-7 w-7 text-[var(--ca-success)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
    </div>
    <h1 class="mt-6 text-3xl font-black tracking-[-0.03em] text-ca-ink">Password changed</h1>
    <p class="ca-copy mt-3">You can now sign in with your new password.</p>
    <a href="{% url 'account_login' %}" class="ca-btn ca-btn-primary mt-8">Sign in</a>
  </div>
</section>
{% endblock content %}
