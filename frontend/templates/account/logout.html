{% extends 'base_app.html' %}
{% load widget_tweaks %}

{% block content %}
<section class="ca-wrap grid min-h-[calc(100vh-7rem)] items-center py-12">
  <div class="ca-panel mx-auto w-full max-w-md p-6 text-center sm:p-8">
    <h1 class="text-3xl font-black tracking-[-0.03em] text-ca-ink">Sign out?</h1>
    <p class="ca-copy mt-3">Confirm that you want to leave the Cleanapp dashboard.</p>
    <form method="post" class="mt-6 flex justify-center" action="{% url 'account_logout' %}">
      {% csrf_token %}

      {% if redirect_field_value %}
        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
      {% endif %}

      <button class="ca-btn ca-btn-danger" type="submit">
        Sign out
      </button>
    </form>
  </div>
</section>
{% endblock content %}
